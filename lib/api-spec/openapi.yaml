openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sms
    description: SMS operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /sms/send:
    post:
      operationId: smsSend
      tags: [sms]
      summary: Send SMS to phone via all APIs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SmsSendBody"
      responses:
        "200":
          description: Results from all API attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsSendResult"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SmsSendBody:
      type: object
      properties:
        phone:
          type: string
        amount:
          type: integer
      required:
        - phone
        - amount
    ApiResult:
      type: object
      properties:
        name:
          type: string
        success:
          type: boolean
      required:
        - name
        - success
    SmsSendResult:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ApiResult"
        successCount:
          type: integer
        failCount:
          type: integer
        totalApis:
          type: integer
      required:
        - results
        - successCount
        - failCount
        - totalApis
